<!DOCTYPE html>
<html lang="id">
<div id="apiStatus"></div>

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Analisis Sentimen IndoBERT</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="background-blur"></div>

    <main class="container-card">

        <!-- HEADER -->

        <section class="text-center mb-10">

            <h1 class="title">

                Analisis Sentimen IndoBERT

            </h1>

            <p class="subtitle">

                Artificial Intelligence untuk Analisis Sentimen Bahasa Indonesia

            </p>

        </section>

        <!-- INPUT -->

        <section>

            <label class="label-title">

                Masukkan Kalimat

            </label>

            <textarea

                id="inputText"

                rows="6"

                placeholder="Contoh:
Program makan bergizi gratis sangat membantu masyarakat."

                class="textarea">

            </textarea>

            <button

                id="predictBtn"

                class="predict-button">

                Analisis Sentimen

            </button>

        </section>

        <!-- LOADING -->

        <section
            id="loadingBox"
            class="hidden mt-10 text-center">

            <div class="loader"></div>

            <p class="loading-text">

                Sedang menganalisis...

            </p>

        </section>

        <!-- RESULT -->

        <section

            id="resultCard"

            class="hidden result-card">

            <h2 class="result-title">

                Hasil Prediksi

            </h2>

            <div class="result-grid">

                <div>

                    <span class="small-title">

                        Label

                    </span>

                    <h3
                        id="labelResult"
                        class="label-result">

                        -

                    </h3>

                </div>

                <div>

                    <span class="small-title">

                        Confidence

                    </span>

                    <h3
                        id="confidenceResult"
                        class="confidence-result">

                        -

                    </h3>

                </div>

            </div>

            <hr class="divider">

            <div>

                <h4 class="small-title mb-4">

                    Probabilitas

                </h4>

                <div id="probabilityBox"></div>
            </div>

            <button

                id="copyBtn"

                class="copy-button">

                Copy Hasil

            </button>

        </section>

    </main>

    <script src="js/app.js"></script>

</body>

</html>
